<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>vctrs WASM Demo</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  body {
    font-family: Inter, system-ui, -apple-system, sans-serif;
    margin: 0; padding: 24px;
    background: #fafafa; color: #1a1a1a;
    line-height: 1.5;
  }
  h2 { margin: 0 0 12px; font-size: 1.1rem; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; max-width: 960px; }
  @media (max-width: 700px) { .grid { grid-template-columns: 1fr; } }
  .card {
    background: #fff; border: 1px solid #e0e0e0; border-radius: 8px;
    padding: 14px;
  }
  label { display: block; font-size: 0.82rem; font-weight: 500; margin-bottom: 3px; color: #555; }
  input, select {
    width: 100%; padding: 7px 10px; border: 1px solid #d0d0d0; border-radius: 6px;
    font-family: 'JetBrains Mono', monospace; font-size: 0.82rem;
    background: #fafafa;
  }
  input:focus, select:focus { outline: none; border-color: #7c4dff; }
  button {
    padding: 6px 14px; border: none; border-radius: 6px; cursor: pointer;
    font-size: 0.82rem; font-weight: 500; transition: background 0.15s;
  }
  .btn-primary { background: #7c4dff; color: #fff; }
  .btn-primary:hover { background: #651fff; }
  .btn-secondary { background: #f0f0f0; color: #333; border: 1px solid #d0d0d0; }
  .btn-secondary:hover { background: #e4e4e4; }
  .btn-danger { background: #ff5252; color: #fff; }
  .btn-danger:hover { background: #ff1744; }
  .btn-row { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .log {
    padding: 8px 12px; border-radius: 6px; font-size: 0.8rem;
    font-family: 'JetBrains Mono', monospace; margin-top: 10px;
    background: #f5f5f5; border: 1px solid #e0e0e0;
    white-space: pre-wrap; max-height: 200px; overflow-y: auto;
  }
  .tag {
    display: inline-block; padding: 2px 8px; border-radius: 4px;
    font-size: 0.75rem; font-weight: 600; margin-bottom: 12px;
  }
  .tag-loading { background: #fff3e0; color: #e65100; }
  .tag-ready { background: #e8f5e9; color: #2e7d32; }
  .tag-error { background: #ffebee; color: #c62828; }
  table { width: 100%; border-collapse: collapse; font-size: 0.82rem; margin-top: 6px; }
  th { text-align: left; padding: 5px 8px; border-bottom: 2px solid #e0e0e0; font-weight: 600; }
  td { padding: 5px 8px; border-bottom: 1px solid #f0f0f0; font-family: 'JetBrains Mono', monospace; font-size: 0.78rem; }
  tr:hover td { background: #f8f8ff; }
  .empty { color: #999; font-style: italic; padding: 10px 0; text-align: center; }
  .stats { font-size: 0.78rem; color: #777; margin-top: 6px; }
  .hint { font-size: 0.78rem; color: #888; margin-top: 4px; line-height: 1.4; }
  .suggested { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
  .suggested button { font-size: 0.75rem; padding: 4px 10px; }
  .preset-desc { font-size: 0.78rem; color: #666; margin-top: 6px; line-height: 1.4; }
  .vector-table { max-height: 260px; overflow-y: auto; }

</head>
<body>

<span class="tag tag-loading" id="status-tag">Loading WASM...</span>
<div id="app" style="display:none">

<div class="grid">
  <!-- Left column -->

      <div class="btn-row">
        <button class="btn-secondary" onclick="loadPreset('movies')">Movies (20)</button>
        <button class="btn-secondary" onclick="loadPreset('cities')">World Cities (20)</button>
        <button class="btn-secondary" onclick="loadPreset('foods')">Foods (20)</button>

      <div id="preset-desc" class="preset-desc"></div>
    </div>

    <div class="card" style="margin-top:12px">

      <div class="vector-table" id="vector-list"><span class="empty">Load a preset or add vectors</span></div>
    </div>

    <div class="card" style="margin-top:12px">
      <h2>Add Custom Vector</h2>
      <label for="add-id">ID</label>
      <input id="add-id" placeholder="e.g. my_item" />
      <label for="add-vec" style="margin-top:6px">Vector (8 comma-separated floats)</label>
      <input id="add-vec" placeholder="e.g. 0.9, 0.7, 0.3, 0.1, 0.5, 0.2, 0.8, 0.4" />
      <label for="add-meta" style="margin-top:6px">Metadata (JSON, optional)</label>
      <input id="add-meta" placeholder='e.g. {"genre": "comedy"}' />
      <div class="btn-row">
        <button class="btn-primary" onclick="addVector()">Add</button>
        <button class="btn-secondary" onclick="addRandom()">Add Random</button>
        <button class="btn-danger" onclick="resetDb()">Reset</button>
      </div>
    </div>
  </div>

  <!-- Right column -->
  <div>
    <div class="card">
      <h2>Search</h2>
      <label for="search-vec">Query Vector</label>
      <input id="search-vec" placeholder="click a suggested search or enter 8 floats" />
      <label for="search-k" style="margin-top:6px">k (results)</label>
      <input id="search-k" type="number" value="5" min="1" max="100" />
      <div class="btn-row">

      </div>
      <div id="suggested-searches"></div>
    </div>

    <div class="card" style="margin-top:12px">
      <h2>Results</h2>
      <div id="results"><span class="empty">Load a preset and try a search</span></div>
    </div>

    <div class="card" style="margin-top:12px">
      <h2>Log</h2>
      <div class="log" id="log"></div>
    </div>
  </div>
</div>

</div>

// ── UI Helpers ──────────────────────────────────────────────────────────

function updateInfo() {
  document.getElementById("db-info").textContent = `(${db.length} vectors, dim=${db.dim})`;
  updateVectorList();
}

function updateVectorList() {
  const el = document.getElementById("vector-list");
  if (vectors.size === 0) {
    el.innerHTML = '<span class="empty">No vectors added yet</span>';
    return;
  }
  let html = '<table><tr><th>ID</th><th>Metadata</th><th></th></tr>';
  for (const [id, v] of vectors) {
    const metaStr = v.meta ? JSON.stringify(v.meta) : "";
    html += `<tr><td>${id}</td><td>${metaStr}</td><td><button class="btn-danger" style="padding:2px 8px;font-size:0.72rem" onclick="deleteVec('${id}')">x</button></td></tr>`;
  }
  html += '</table>';
  el.innerHTML = html;
}

function showSuggested(searches) {
  const el = document.getElementById("suggested-searches");
  if (!searches || searches.length === 0) {
    el.innerHTML = '';
    return;
  }
  let html = '<label style="margin-top:10px">Suggested searches</label><div class="suggested">';
  for (let i = 0; i < searches.length; i++) {
    html += `<button class="btn-secondary" onclick="useSuggested(${i})">${searches[i].label}</button>`;
  }
  html += '</div><div class="hint" id="search-hint"></div>';
  el.innerHTML = html;
}

let currentSearches = [];

window.useSuggested = function(i) {
  const s = currentSearches[i];
  document.getElementById("search-vec").value = s.vec.join(", ");
  document.getElementById("search-hint").textContent = s.hint;
  doSearch();
};

// ── Core Functions ─────────────────────────────────────────────────────

window.loadPreset = function(name) {
  resetDbInner();
  const preset = PRESETS[name];
  for (const [id, {vec, meta}] of Object.entries(preset.data)) {
    db.add(id, new Float32Array(vec), meta);
    vectors.set(id, { vec, meta });
  }
  log(`Loaded "${name}" preset (${Object.keys(preset.data).length} vectors)`);
  document.getElementById("preset-desc").innerHTML = preset.desc;
  currentSearches = preset.searches;
  showSuggested(preset.searches);
  updateInfo();
};

window.addVector = function() {
  const id = document.getElementById("add-id").value.trim();
  const vecStr = document.getElementById("add-vec").value.trim();
  const metaStr = document.getElementById("add-meta").value.trim();
  if (!id || !vecStr) { log("Error: ID and vector required"); return; }
  try {
    const vec = new Float32Array(vecStr.split(",").map(Number));
    if (vec.length !== DIM) { log(`Error: expected ${DIM} dimensions, got ${vec.length}`); return; }
    const meta = metaStr ? JSON.parse(metaStr) : null;
    db.add(id, vec, meta);
    vectors.set(id, { vec: Array.from(vec), meta });
    log(`Added "${id}"`);
    updateInfo();
    document.getElementById("add-id").value = "";
    document.getElementById("add-vec").value = "";
    document.getElementById("add-meta").value = "";
  } catch (e) { log(`Error: ${e}`); }
};

window.addRandom = function() {
  const id = `rand_${randomCounter++}`;
  const vec = new Float32Array(DIM);
  for (let i = 0; i < DIM; i++) vec[i] = Math.random();
  try {
    db.add(id, vec, { random: true });
    vectors.set(id, { vec: Array.from(vec), meta: { random: true } });
    log(`Added "${id}"`);
    updateInfo();
  } catch (e) { log(`Error: ${e}`); }
};

window.deleteVec = function(id) {
  try {
    db.delete(id);
    vectors.delete(id);
    log(`Deleted "${id}"`);
    updateInfo();
  } catch (e) { log(`Error: ${e}`); }
};

window.doSearch = function() {
  const vecStr = document.getElementById("search-vec").value.trim();
  const k = parseInt(document.getElementById("search-k").value) || 5;
  if (!vecStr) { log("Error: query vector required"); return; }
  try {
    const vec = new Float32Array(vecStr.split(",").map(Number));
    if (vec.length !== DIM) { log(`Error: expected ${DIM} dimensions, got ${vec.length}`); return; }
    const t = performance.now();
    const results = db.search(vec, k);
    const elapsed = performance.now() - t;

    const el = document.getElementById("results");
    if (results.length === 0) {
      el.innerHTML = '<span class="empty">No results</span>';
    } else {
      let html = '<table><tr><th>#</th><th>ID</th><th>Distance</th><th>Metadata</th></tr>';
      for (let i = 0; i < results.length; i++) {
        const r = results[i];
        const meta = r.metadata;
        html += `<tr><td>${i + 1}</td><td>${r.id}</td><td>${r.distance.toFixed(4)}</td><td>${meta ? JSON.stringify(meta) : ""}</td></tr>`;
        r.free();
      }
      html += '</table>';
      html += `<div class="stats">${results.length} results in ${elapsed.toFixed(3)}ms</div>`;
      el.innerHTML = html;
    }
    log(`Search: ${results.length} results in ${elapsed.toFixed(3)}ms`);
  } catch (e) { log(`Error: ${e}`); }
};

function resetDbInner() {
  if (db) db.free();
  db = new VctrsDatabase(DIM, "cosine");
  vectors.clear();
  randomCounter = 0;
}

window.resetDb = function() {
  resetDbInner();
  currentSearches = [];
  showSuggested([]);
  document.getElementById("preset-desc").innerHTML = "";
  log("Database reset");
  updateInfo();
  document.getElementById("results").innerHTML = '<span class="empty">Load a preset and try a search</span>';
};

// ── Init ────────────────────────────────────────────────────────────────

try {
  await init();
  db = new VctrsDatabase(DIM, "cosine");
  document.getElementById("status-tag").className = "tag tag-ready";
  document.getElementById("status-tag").textContent = "WASM Ready (220KB)";
  document.getElementById("app").style.display = "block";
  log("vctrs WASM loaded");
  updateInfo();
} catch (e) {
  document.getElementById("status-tag").className = "tag tag-error";
  document.getElementById("status-tag").textContent = `Error: ${e}`;
}
</script>
</body>
